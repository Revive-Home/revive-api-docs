name: Enrich OpenAPI spec and update banner

on:
  push:
    branches: [main]
    paths:
      - openapi.json

permissions:
  contents: write

jobs:
  enrich-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enrich OpenAPI spec
        run: node scripts/enrich-openapi.mjs

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -e "const fs = require('fs'); const s = JSON.parse(fs.readFileSync('./openapi.json','utf8')); console.log(s.info.version)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update introduction banner
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date -u +"%B %-d, %Y")
          sed -i "s|\*\*API spec version:\*\* .*|\*\*API spec version:\*\* ${VERSION} — auto-synced from \`revive-api\` on every production release. Last updated ${DATE}.|" api-reference/introduction.mdx
          echo "Updated to ${VERSION} (${DATE})"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add openapi.json api-reference/introduction.mdx
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "docs: enrich OpenAPI spec and update banner to ${{ steps.version.outputs.version }}"
          git push
