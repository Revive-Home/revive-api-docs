name: Update platform pulse dates

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * *'   # daily at 8am UTC (catches deploys to other repos)
  workflow_dispatch: {}     # manual trigger

permissions:
  contents: write

jobs:
  update-pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update platform pulse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-pulse.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.mdx api-reference/introduction.mdx
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update platform pulse dates [skip ci]"
          git push
