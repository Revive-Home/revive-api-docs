name: Generate release notes

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version for the docs page (example: v1.12.0)"
        required: true
        type: string
      overwrite:
        description: "Overwrite the release notes page if it already exists"
        required: false
        default: false
        type: boolean
      since:
        description: "Only include PRs merged on/after this date (YYYY-MM-DD)"
        required: true
        type: string
      label:
        description: "PR label that indicates the change shipped to production"
        required: false
        default: "released"
        type: string
      source_repo:
        description: "Which repo released (e.g. revive-api). Leave blank to search all repos."
        required: false
        type: string
  repository_dispatch:
    types: [generate-release-notes]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.release_version || github.event.client_payload.release_version }}
      OVERWRITE: ${{ inputs.overwrite || github.event.client_payload.overwrite || 'false' }}
      SINCE: ${{ inputs.since || github.event.client_payload.since || '' }}
      LABEL: ${{ inputs.label || github.event.client_payload.label || 'released' }}
      SOURCE_REPO: ${{ inputs.source_repo || github.event.client_payload.source_repo || '' }}
    steps:
      - name: Validate version
        run: |
          if [ -z "$VERSION" ]; then
            echo "::error::No release version provided. Pass it via workflow_dispatch input or repository_dispatch client_payload."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_NOTES_GITHUB }}
          RELEASE_VERSION: ${{ env.VERSION }}
          RELEASE_OVERWRITE: ${{ env.OVERWRITE }}
          RELEASE_SINCE: ${{ env.SINCE }}
          RELEASE_LABEL: ${{ env.LABEL }}
          SOURCE_REPO: ${{ env.SOURCE_REPO }}
        run: node scripts/generate-release-notes.mjs

      - name: Commit and push directly
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-notes.mdx
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "docs: add ${{ env.VERSION }} release notes [skip ci]"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: steps.commit.outputs.pushed == 'true'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_RELEASE_NOTES_WEBHOOK }}
        run: |
          REPO_LABEL="${{ env.SOURCE_REPO }}"
          [ -z "$REPO_LABEL" ] && REPO_LABEL="multiple repos"
          DOCS_URL="https://tech.revive.realestate/release-notes"

          curl -sf -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "text": "<!channel> � *New tech release!* *${VERSION}* just shipped for *${REPO_LABEL}*\n\nTo see what's new, check out the release notes:\n<${DOCS_URL}|📋 View Release Notes>\n\nPassword: \`ChampionHomeowners\`",
            "unfurl_links": false
          }
          EOF
          )"
